<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ปฏิบัติธรรม">
<title>สมุดบันทึกการปฏิบัติธรรม</title>
<style>
:root {
  --pink:       #E8709A;
  --pink-mid:   #F2A8C2;
  --pink-light: #FCE8F1;
  --pink-pale:  #FFF5FA;
  --green:      #5BAE82;
  --green-mid:  #A3D4B8;
  --green-light:#E6F5EC;
  --green-pale: #F2FAF5;
  --gold:       #C49A2A;
  --gold-light: #FFF8E6;
  --red-light:  #FFEBEE;
  --red-dark:   #C62828;
  --bg:         #FDF8FC;
  --surface:    #FFFFFF;
  --border:     #EDDDE8;
  --text:       #2D1B29;
  --text2:      #7B5A70;
  --text3:      #B89AAE;
  --radius:     14px;
  --radius-sm:  9px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Sarabun', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.55; }
.app { max-width: 500px; margin: 0 auto; padding-bottom: 60px; }

/* ─── HEADER ─── */
.header { background: linear-gradient(160deg, #F7C5DC 0%, #EBF7F0 100%); padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--pink-mid); }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header-title { display: flex; align-items: center; gap: 8px; }
.lotus-icon { font-size: 28px; line-height: 1; }
.header-name { font-size: 17px; font-weight: 700; color: var(--text); }
.header-sub  { font-size: 11px; color: var(--text2); margin-top: 1px; }
.header-actions { display: flex; gap: 6px; }
.icon-btn { background: rgba(255,255,255,0.6); border: 1px solid var(--pink-mid); border-radius: 8px; color: var(--text2); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
.icon-btn:active { background: var(--pink-light); }
.tab-bar { display: flex; }
.tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text2); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; }
.tab.active { color: var(--pink); border-bottom-color: var(--pink); }

/* ─── DHAMMA QUOTE ─── */
.quote-wrap { margin: 10px 12px 0; background: white; border: 1px solid var(--green-mid); border-radius: var(--radius); padding: 14px 14px 12px; position: relative; }
.lotus-deco { position: absolute; right: 12px; top: 10px; font-size: 22px; opacity: 0.35; }
.quote-label { font-size: 10px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.quote-text { font-size: 14px; color: var(--text); line-height: 1.75; padding-right: 28px; }
.quote-src { font-size: 11px; color: var(--pink); margin-top: 8px; font-weight: 600; }
.quote-btn { position: absolute; bottom: 10px; right: 10px; background: none; border: none; font-size: 15px; cursor: pointer; color: var(--text3); padding: 2px; }

/* ─── PAGES ─── */
.page { display: none; padding: 10px 12px 0; }
.page.active { display: block; }
.round-info { font-size: 12px; color: var(--text2); padding: 6px 0 10px; display: flex; align-items: center; gap: 6px; }
.round-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--pink); flex-shrink: 0; }

/* ─── BANNER ─── */
.banner { background: linear-gradient(135deg, var(--pink-pale), var(--green-light)); border: 1px solid var(--pink-mid); border-radius: var(--radius); padding: 20px; text-align: center; margin-bottom: 14px; }
.banner h2 { font-size: 18px; color: var(--pink); margin-bottom: 4px; font-weight: 700; }
.banner p  { font-size: 13px; color: var(--green); margin-bottom: 14px; font-weight: 600; }
.btn-new-round { padding: 11px 28px; background: linear-gradient(135deg, var(--pink), var(--green)); color: white; border: none; border-radius: 30px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* ─── DAY CARD ─── */
.day-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.day-card.day-ok { border-color: var(--green-mid); }
.day-header { display: flex; align-items: center; justify-content: space-between; padding: 13px 14px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
.day-header:active { background: var(--pink-pale); }
.day-num { width: 30px; height: 30px; border-radius: 50%; background: var(--pink-light); color: var(--pink); font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 10px; }
.day-num.ok { background: var(--green-light); color: var(--green); }
.day-info { flex: 1; }
.day-name { font-weight: 700; font-size: 15px; color: var(--text); }
.day-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 3px; }
.badge { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 600; }
.badge-ok    { background: var(--green-light); color: #1B5E40; }
.badge-short { background: var(--gold-light);  color: #7B4D00; }
.badge-empty { background: #F5F5F5; color: var(--text3); font-weight: 400; }
.badge-ded   { background: var(--pink-light); color: var(--pink); }
.chevron { font-size: 16px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
.chevron.open { transform: rotate(180deg); }

/* ─── DAY BODY ─── */
.day-body { border-top: 1px solid var(--border); padding: 16px; display: none; background: var(--green-pale); }
.day-body.open { display: block; }
.sec-lbl { font-size: 11px; font-weight: 700; color: var(--pink); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }

/* ─── TYPE PICKER ─── */
.type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.type-card { border: 1.5px solid var(--border); border-radius: var(--radius); background: white; padding: 14px 8px; text-align: center; cursor: pointer; }
.type-card.sel { border-color: var(--green); background: var(--green-light); }
.type-card .tc-icon { font-size: 26px; margin-bottom: 4px; }
.type-card .tc-label { font-size: 13px; font-weight: 600; color: var(--text2); }
.type-card.sel .tc-label { color: var(--green); }

/* ─── TIME PICKER ─── */
.time-label { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
.time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 7px; }
.time-btn { border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: white; padding: 10px 4px; text-align: center; cursor: pointer; }
.time-btn .tb-num  { font-size: 18px; font-weight: 700; color: var(--text); display: block; }
.time-btn .tb-unit { font-size: 11px; color: var(--text2); }
.time-btn.sel { border-color: var(--pink); background: var(--pink-light); }
.time-btn.sel .tb-num { color: var(--pink); }
.time-btn.custom { border-style: dashed; }
.time-btn.custom .tb-num { font-size: 14px; }
.custom-input-wrap { display: none; margin-bottom: 10px; }
.custom-input-wrap.show { display: block; }
.custom-input { width: 100%; padding: 10px 12px; border: 1.5px solid var(--pink-mid); border-radius: var(--radius-sm); font-size: 16px; text-align: center; font-weight: 700; color: var(--pink); }

/* ─── ADD BUTTON ─── */
.add-session-btn { width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none; background: linear-gradient(135deg, var(--green), #4A9E72); color: white; font-size: 14px; font-weight: 700; cursor: pointer; margin-bottom: 14px; }
.add-session-btn:active { opacity: 0.85; }

/* ─── SESSION LIST ─── */
.session-list { margin-bottom: 12px; }
.session-item { display: flex; align-items: center; gap: 8px; background: white; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 7px; }
.sess-icon { font-size: 18px; }
.sess-info { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
.sess-min { font-size: 12px; color: var(--text2); font-weight: 400; }
.del-btn { width: 28px; height: 28px; border: none; background: none; color: #BDBDBD; font-size: 20px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.del-btn:active { background: var(--red-light); color: var(--red-dark); }

/* ─── NOTE ─── */
.note-area { width: 100%; padding: 10px 12px; border: 1.5px solid var(--green-mid); border-radius: var(--radius-sm); font-size: 14px; resize: vertical; min-height: 64px; font-family: inherit; color: var(--text); background: white; margin-bottom: 12px; }
.note-area:focus { outline: none; border-color: var(--pink); }

/* ─── DEDICATE ─── */
.ded-row { display: flex; align-items: center; justify-content: space-between; padding-top: 12px; border-top: 1px solid var(--green-mid); }
.day-total-text { font-size: 13px; color: var(--text2); }
.ded-btn { padding: 8px 16px; border: 1.5px solid var(--border); border-radius: 30px; background: white; font-size: 13px; cursor: pointer; color: var(--text2); }
.ded-btn.dedicated { background: var(--pink-light); border-color: var(--pink-mid); color: var(--pink); font-weight: 700; }

/* ─── PROGRESS ─── */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-box { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 10px; text-align: center; }
.stat-num { font-size: 26px; font-weight: 800; color: var(--pink); }
.stat-lbl { font-size: 12px; color: var(--text2); margin-top: 2px; }
.trophy-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 16px; }
.trophy-box { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: #F9F5F8; }
.trophy-box.unlocked { background: var(--gold-light); border-color: #F6CC6A; }
.trophy-ico  { font-size: 18px; }
.trophy-lock { font-size: 13px; color: var(--text3); }
.trophy-lbl  { font-size: 9px; color: var(--text3); text-align: center; line-height: 1.2; }
.trophy-lbl.unlocked { color: var(--gold); font-weight: 700; }
.history-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.history-hdr  { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; cursor: pointer; }
.history-hdr:active { background: var(--pink-pale); }
.history-body { border-top: 1px solid var(--border); display: none; }
.history-body.open { display: block; }
.history-row  { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; border-bottom: 1px solid #FAF0F6; font-size: 13px; }
.history-row:last-child { border-bottom: none; }
.text-ok    { color: var(--green);  font-weight: 700; }
.text-short { color: #9A6A00; }
.p-title { font-size: 12px; font-weight: 700; color: var(--pink); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }

/* ─── NAME SCREEN ─── */
.name-screen { position: fixed; inset: 0; background: linear-gradient(160deg, #FCE8F1 0%, #E6F5EC 100%); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
.name-lotus  { font-size: 64px; margin-bottom: 12px; }
.name-title  { font-size: 22px; font-weight: 800; color: var(--pink); margin-bottom: 6px; }
.name-sub    { font-size: 14px; color: var(--text2); margin-bottom: 28px; text-align: center; line-height: 1.7; }
.name-input  { width: 100%; max-width: 320px; padding: 14px 18px; border: 2px solid var(--pink-mid); border-radius: var(--radius); font-size: 17px; text-align: center; font-family: inherit; color: var(--text); margin-bottom: 14px; }
.name-input:focus { outline: none; border-color: var(--pink); }
.name-btn { width: 100%; max-width: 320px; padding: 14px; border: none; border-radius: 30px; background: linear-gradient(135deg, var(--pink), var(--green)); color: white; font-size: 16px; font-weight: 800; cursor: pointer; }

/* ─── MODAL ─── */
.modal-overlay { position: fixed; inset: 0; background: rgba(45,27,41,0.45); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: var(--radius); padding: 22px; width: 100%; max-width: 360px; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; color: var(--pink); }
.modal p  { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
.modal-btns { display: flex; gap: 8px; }
.modal-btn { flex: 1; padding: 10px; border-radius: 30px; border: 1px solid var(--border); background: white; font-size: 14px; cursor: pointer; font-weight: 600; color: var(--text2); }
.modal-btn.primary { background: linear-gradient(135deg, var(--pink), var(--green)); color: white; border: none; }

/* ─── TOAST ─── */
.toast { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }

/* ─── TIMER ─── */
.timer-box { background: white; border: 1.5px solid var(--green-mid); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 12px; }
.timer-display { font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: 3px; color: var(--text); text-align: center; margin-bottom: 10px; }
.timer-btns { display: flex; gap: 8px; }
.btn-timer-start { flex: 1; padding: 11px 8px; border: none; border-radius: 30px; background: linear-gradient(135deg, var(--green), #3D8F62); color: white; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-timer-pause { flex: 1; padding: 11px 8px; border: 1.5px solid var(--gold); border-radius: 30px; background: var(--gold-light); color: #7B4D00; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-timer-save  { flex: 1; padding: 11px 8px; border: none; border-radius: 30px; background: linear-gradient(135deg, var(--pink), #C85080); color: white; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-timer-reset { width: 38px; flex-shrink: 0; padding: 11px 6px; border: 1px solid var(--border); border-radius: 30px; background: white; font-size: 14px; cursor: pointer; color: var(--text3); }
.btn-timer-save:disabled { opacity: 0.4; cursor: default; }
.timer-running-badge { display:inline-block; font-size:11px; background:var(--pink-light); color:var(--pink); padding:2px 8px; border-radius:20px; font-weight:700; margin-bottom:6px; }
</style>
</head>
<body>

<!-- Name Entry Screen -->
<div class="name-screen" id="name-screen">
  <div class="name-lotus">🪷</div>
  <div class="name-title">สมุดปฏิบัติธรรม</div>
  <div class="name-sub">กรอกชื่อของท่านเพื่อเริ่มต้น<br>บันทึกการภาวนาประจำวัน</div>
  <input class="name-input" id="name-input" type="text" placeholder="ชื่อของท่าน..." maxlength="30">
  <button class="name-btn" onclick="saveName()">เริ่มปฏิบัติ 🌿</button>
</div>

<!-- Main App -->
<div class="app" id="main-app" style="display:none;">
  <div class="header">
    <div class="header-top">
      <div class="header-title">
        <span class="lotus-icon">🪷</span>
        <div>
          <div class="header-name" id="display-name">สมุดปฏิบัติธรรม</div>
          
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="exportData()" title="สำรองข้อมูล">💾</button>
        <button class="icon-btn" onclick="document.getElementById('import-file').click()" title="นำเข้าข้อมูล">📂</button>
        <button class="icon-btn" onclick="editName()" title="แก้ไขชื่อ">✏️</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab active" onclick="showPage('journal',this)">✍️ บันทึก</button>
      <button class="tab" onclick="showPage('progress',this)">🏆 ความคืบหน้า</button>
    </div>
  </div>

  <!-- Pali Motto -->
  <div class="quote-wrap">
    <span class="lotus-deco">🪷</span>
    <div style="font-size:17px;letter-spacing:0.03em;color:var(--pink);font-style:italic;font-weight:700;margin-bottom:6px;">วิริเยน ทุกฺขมจฺเจติ</div>
    <div style="font-size:14px;color:var(--green);font-weight:600;">"บุคคลล่วงทุกข์ได้ด้วยความเพียร"</div>
  </div>

  <div id="page-journal"  class="page active"></div>
  <div id="page-progress" class="page"></div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="m-title"></h3><p id="m-body"></p>
    <div class="modal-btns" id="m-btns"></div>
  </div>
</div>

<script>
const QUOTES = [];

/* ═══ CONFIG ═══ */
const TROPHIES=[{icon:'🌱',label:'รอบแรก',rounds:1},{icon:'🌿',label:'2 รอบ',rounds:2},{icon:'🌳',label:'3 รอบ',rounds:3},{icon:'💎',label:'5 รอบ',rounds:5},{icon:'🏆',label:'7 รอบ',rounds:7},{icon:'👑',label:'10 รอบ',rounds:10},{icon:'🌟',label:'15 รอบ',rounds:15}];
const DAY_NAMES=['วันที่ 1','วันที่ 2','วันที่ 3','วันที่ 4','วันที่ 5','วันที่ 6','วันที่ 7'];
const DAY_WEEK=['จันทร์','อังคาร','พุธ','พฤหัส','ศุกร์','เสาร์','อาทิตย์'];
const TIME_OPTS=[15,20,30,45,60,90,120];
const TARGET=180, KEY='dhamma_v3';
const TYPE_INFO={walk:{icon:'🚶',label:'เดินจงกรม'},sit:{icon:'🧘',label:'นั่งสมาธิ'}};

/* ═══ STATE ═══ */
let data=loadData(), openDays={};
let qIdx=Math.floor(Math.random()*QUOTES.length);
let pendingType={}, pendingTime={}, timerState={}, timerIv={};

/* ═══ DATA ═══ */
function loadData(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return{name:'',currentRound:1,rounds:[makeRound(1)]};
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}}
function makeRound(num){
  const d=new Date();
  return{roundNum:num,startDate:d.toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'}),
    days:Array.from({length:7},(_,i)=>({dayIndex:i,sessions:[],note:'',dedicated:false}))};
}
function curRound(){return data.rounds[data.rounds.length-1];}
function dayTotal(day){return day.sessions.reduce((s,x)=>s+(parseInt(x.minutes)||0),0);}
function fmtMin(m){m=Math.max(0,Math.round(m));if(m<60)return m+' นาที';const h=Math.floor(m/60),mn=m%60;return h+' ชม.'+(mn?mn+' นาที':'');}
function isComplete(round){return round.days.every(d=>d.sessions.length>0);}

/* ═══ NAME ═══ */
function saveName(){
  const v=document.getElementById('name-input').value.trim();
  if(!v)return showToast('กรุณากรอกชื่อก่อนนะคะ 🙏');
  data.name=v; save(); bootApp();
}
function bootApp(){
  document.getElementById('name-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('display-name').textContent=data.name ? data.name+' 🙏' : 'สมุดปฏิบัติธรรม';
  showQuote(); renderJournal();
}
function editName(){
  showModal('แก้ไขชื่อ','กรุณากรอกชื่อใหม่ของท่าน',[
    {label:'ยกเลิก'},
    {label:'บันทึก',primary:true,action:()=>{
      const v=prompt('ชื่อของท่าน:',data.name);
      if(v&&v.trim()){data.name=v.trim();save();document.getElementById('display-name').textContent=data.name+' 🙏';showToast('บันทึกชื่อแล้ว ✓');}
    }}
  ]);
}

/* ═══ QUOTE ═══ */
function showQuote(){const q=QUOTES[qIdx];document.getElementById('q-text').textContent='\u201c'+q.text+'\u201d';document.getElementById('q-src').textContent='— '+q.src;}
function nextQuote(){qIdx=(qIdx+1)%QUOTES.length;showQuote();}

/* ═══ UI UTILS ═══ */
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function showModal(title,body,btns){
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-body').textContent=body;
  const el=document.getElementById('m-btns');el.innerHTML='';
  btns.forEach(b=>{const btn=document.createElement('button');btn.className='modal-btn'+(b.primary?' primary':'');btn.textContent=b.label;btn.onclick=()=>{closeModal();b.action&&b.action();};el.appendChild(btn);});
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal();});
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  if(page==='journal')renderJournal();
  if(page==='progress')renderProgress();
}

/* ═══ JOURNAL ═══ */
function renderJournal(){
  const el=document.getElementById('page-journal');
  const round=curRound(), complete=isComplete(round);
  let html=`<div class="round-info"><span class="round-dot"></span>รอบที่ ${round.roundNum} · เริ่ม ${round.startDate}</div>`;
  if(complete){html+=`<div class="banner"><h2>ยินดีด้วย! ครบ 7 วัน 🎉</h2><p>รอบที่ ${round.roundNum} สำเร็จสมบูรณ์</p><button class="btn-new-round" onclick="confirmNewRound()">🔄 เริ่มรอบใหม่</button></div>`;}
  round.days.forEach((_,di)=>{ html+=renderDayCard(round,di); });
  el.innerHTML=html;
  round.days.forEach((_,di)=>{
    if(openDays[di]){
      const b=document.getElementById('db-'+di),c=document.getElementById('chev-'+di);
      if(b)b.classList.add('open');if(c)c.classList.add('open');
    }
  });
}
function renderDayCard(round,di){
  const day=round.days[di],total=dayTotal(day);
  const badge=total>0?`<span class="badge badge-ok">✓ ${fmtMin(total)}</span>`:`<span class="badge badge-empty">ยังไม่ได้ปฏิบัติ</span>`;
  const ded=day.dedicated?`<span class="badge badge-ded">🙏 ถวายแล้ว</span>`:'';
  return`<div class="day-card ${total>0?'day-ok':''}">
    <div class="day-header" onclick="toggleDay(${di})">
      <div class="day-num ${total>=TARGET?'ok':''}">${di+1}</div>
      <div class="day-info">
        <div class="day-name">${DAY_NAMES[di]} · ${DAY_WEEK[di]}</div>
        <div class="day-meta">${badge}${ded}</div>
      </div>
      <span class="chevron" id="chev-${di}">▾</span>
    </div>
    <div class="day-body" id="db-${di}">${renderDayBody(round,di)}</div>
  </div>`;
}
function renderDayBody(round,di){
  const day=round.days[di];
  const total=dayTotal(day);
  const pt=pendingType[di]||'walk';
  const ptime=pendingTime[di]||null;
  const sessList=day.sessions.map((s,si)=>`
    <div class="session-item">
      <span class="sess-icon">${TYPE_INFO[s.type].icon}</span>
      <span class="sess-info">${TYPE_INFO[s.type].label} <span class="sess-min">${fmtMin(s.minutes)}</span></span>
      <button class="del-btn" onclick="delSess(${di},${si})">×</button>
    </div>`).join('');
  const timeOpts=TIME_OPTS.map(t=>`
    <div class="time-btn ${ptime===t?'sel':''}" onclick="selectTime(${di},${t})">
      <span class="tb-num">${t}</span><span class="tb-unit">นาที</span>
    </div>`).join('');
  return`
    <div class="sec-lbl">🚶 เลือกประเภทการปฏิบัติ</div>
    <div class="type-row">
      <div class="type-card ${pt==='walk'?'sel':''}" onclick="selectType(${di},'walk')">
        <div class="tc-icon">🚶</div><div class="tc-label">เดินจงกรม</div>
      </div>
      <div class="type-card ${pt==='sit'?'sel':''}" onclick="selectType(${di},'sit')">
        <div class="tc-icon">🧘</div><div class="tc-label">นั่งสมาธิ</div>
      </div>
    </div>
    <div class="sec-lbl">⏱ จับเวลาอัตโนมัติ</div>
    <div class="timer-box">
      ${timerState[di]&&timerState[di].running?'<div class="timer-running-badge">⏱ กำลังจับเวลา...</div>':''}
      <div class="timer-display" id="td-${di}">${fmtSec(timerState[di]?timerState[di].elapsed:0)}</div>
      <div class="timer-btns">
        ${timerState[di]&&timerState[di].running
          ? `<button class="btn-timer-pause" onclick="pauseTimer(${di})">⏸ หยุด</button>`
          : `<button class="btn-timer-start" onclick="startTimer(${di})">▶ เริ่ม</button>`}
        <button class="btn-timer-save" onclick="saveTimer(${di})" ${!timerState[di]||!timerState[di].elapsed?'disabled':''}>💾 บันทึก</button>
        <button class="btn-timer-reset" onclick="resetTimer(${di})" title="รีเซ็ต">↺</button>
      </div>
    </div>
    <div class="sec-lbl">⏱ หรือเลือกเวลา (นาที)</div>
    <div class="time-label">เลือกช่วงเวลาสำเร็จรูป หรือกรอกเอง</div>
    <div class="time-grid">${timeOpts}
      <div class="time-btn custom ${ptime==='custom'?'sel':''}" onclick="selectCustomTime(${di})">
        <span class="tb-num">กำหนด</span><span class="tb-unit">เอง</span>
      </div>
    </div>
    <div class="custom-input-wrap ${ptime==='custom'?'show':''}" id="ci-${di}">
      <input class="custom-input" type="number" min="1" max="480" placeholder="จำนวนนาที..." id="custom-val-${di}" oninput="updateCustom(${di})">
    </div>
    <button class="add-session-btn" onclick="addSess(${di})">+ เพิ่ม${TYPE_INFO[pt].icon} ${pt==='walk'?'เดินจงกรม':'นั่งสมาธิ'}${ptime&&ptime!=='custom'?' '+ptime+' นาที':ptime==='custom'?' (กำหนดเอง)':''}</button>
    ${sessList?`<div class="sec-lbl">📋 ช่วงที่บันทึกแล้ว</div><div class="session-list">${sessList}</div>`:''}
    <div class="sec-lbl">📝 บันทึกจิตใจ</div>
    <textarea class="note-area" placeholder="ความรู้สึก · สิ่งที่สังเกต · จิตใจวันนี้..." onchange="saveNote(${di},this.value)">${day.note}</textarea>
    <div class="ded-row">
      <span class="day-total-text">รวมวันนี้: <strong>${fmtMin(total)}</strong></span>
      <button class="ded-btn ${day.dedicated?'dedicated':''}" onclick="toggleDed(${di})">
        ${day.dedicated?'🙏 ถวายแล้ว':'🙏 ถวายการปฏิบัติ'}
      </button>
    </div>`;
}
function toggleDay(di){
  openDays[di]=!openDays[di];
  document.getElementById('db-'+di).classList.toggle('open',openDays[di]);
  document.getElementById('chev-'+di).classList.toggle('open',openDays[di]);
}
function refreshDayBody(di){
  const body=document.getElementById('db-'+di);if(!body)return;
  body.innerHTML=renderDayBody(curRound(),di);
  const day=curRound().days[di],total=dayTotal(day);
  const meta=body.parentElement.querySelector('.day-meta');
  if(meta){
    const badge=total>0?`<span class="badge badge-ok">✓ ${fmtMin(total)}</span>`:`<span class="badge badge-empty">ยังไม่ได้ปฏิบัติ</span>`;
    const ded=day.dedicated?`<span class="badge badge-ded">🙏 ถวายแล้ว</span>`:'';
    meta.innerHTML=badge+ded;
  }
  body.parentElement.classList.toggle('day-ok',total>0);
  const num=body.parentElement.querySelector('.day-num');
  if(num){num.classList.toggle('ok',total>0);}
  if(timerState[di]&&timerState[di].running){
    if(timerIv[di])clearInterval(timerIv[di]);
    timerIv[di]=setInterval(()=>{
      const t=timerState[di];if(!t||!t.running){clearInterval(timerIv[di]);return;}
      t.elapsed=Math.floor((Date.now()-t.startTs)/1000);
      const el=document.getElementById('td-'+di);if(el)el.textContent=fmtSec(t.elapsed);
    },1000);
  }
}

/* Session helpers */
function selectType(di,type){pendingType[di]=type;refreshDayBody(di);}
function selectTime(di,t){pendingTime[di]=t;refreshDayBody(di);}
function selectCustomTime(di){pendingTime[di]='custom';refreshDayBody(di);setTimeout(()=>{const el=document.getElementById('custom-val-'+di);if(el)el.focus();},50);}
function updateCustom(di){/* live */ }
function addSess(di){
  const type=pendingType[di]||'walk';
  let mins=0;
  if(pendingTime[di]==='custom'){const el=document.getElementById('custom-val-'+di);mins=parseInt(el?el.value:0)||0;}
  else mins=parseInt(pendingTime[di])||0;
  if(!mins){showToast('กรุณาเลือกหรือกรอกเวลาก่อนนะคะ ⏱');return;}
  curRound().days[di].sessions.push({type,minutes:mins});
  save();pendingTime[di]=null;
  showToast('บันทึก '+TYPE_INFO[type].label+' '+fmtMin(mins)+' แล้ว 🙏');
  refreshDayBody(di);
  if(isComplete(curRound()))setTimeout(renderJournal,400);
}
function delSess(di,si){curRound().days[di].sessions.splice(si,1);save();refreshDayBody(di);}
function saveNote(di,val){curRound().days[di].note=val;save();}
function toggleDed(di){curRound().days[di].dedicated=!curRound().days[di].dedicated;save();refreshDayBody(di);}

function confirmNewRound(){
  showModal('เริ่มรอบใหม่?','ข้อมูลรอบที่ผ่านมาจะเก็บไว้ในประวัติ ไม่มีการลบ',[
    {label:'ยกเลิก'},
    {label:'เริ่มรอบใหม่',primary:true,action:()=>{
      data.currentRound++;data.rounds.push(makeRound(data.currentRound));
      openDays={};save();renderJournal();showToast('เริ่มรอบที่ '+data.currentRound+' แล้ว 🌱');
    }}
  ]);
}

/* ═══ PROGRESS ═══ */
function renderProgress(){
  const el=document.getElementById('page-progress');
  const completed=data.rounds.filter(r=>isComplete(r)).length;
  const totalDays=data.rounds.reduce((s,r)=>s+r.days.filter(d=>dayTotal(d)>0).length,0);
  const totalMins=data.rounds.reduce((s,r)=>s+r.days.reduce((s2,d)=>s2+dayTotal(d),0),0);
  const trophies=TROPHIES.map(tr=>{const ok=completed>=tr.rounds;return`<div class="trophy-box ${ok?'unlocked':''}"><span class="${ok?'trophy-ico':'trophy-lock'}">${ok?tr.icon:'🔒'}</span><span class="trophy-lbl ${ok?'unlocked':''}">${tr.label}</span></div>`;}).join('');
  const history=[...data.rounds].reverse().map(round=>{
    const rt=round.days.reduce((s,d)=>s+dayTotal(d),0),ok=isComplete(round);
    const rows=round.days.map(d=>{const dt=dayTotal(d);return`<div class="history-row"><span>${DAY_NAMES[d.dayIndex]}</span><span style="display:flex;align-items:center;gap:8px;">${d.dedicated?'<span style="font-size:12px;">🙏</span>':''}<span class="${dt>=TARGET?'text-ok':dt>0?'text-short':''}">${dt>0?fmtMin(dt):'—'}</span></span></div>`;}).join('');
    return`<div class="history-card"><div class="history-hdr" onclick="this.nextElementSibling.classList.toggle('open');this.querySelector('.hchev').style.transform=this.nextElementSibling.classList.contains('open')?'rotate(180deg)':''"><div><span style="font-weight:700;">รอบที่ ${round.roundNum}</span><span style="font-size:12px;color:var(--text2);margin-left:6px;">${round.startDate}</span></div><span style="display:flex;align-items:center;gap:8px;font-size:13px;">${ok?'<span class="text-ok">✓ ครบ</span>':'<span class="text-short">ไม่ครบ</span>'}<span style="color:var(--text2);">${fmtMin(rt)}</span><span class="hchev" style="transition:transform 0.2s;color:var(--text3);">▾</span></span></div><div class="history-body">${rows}</div></div>`;
  }).join('');
  el.innerHTML=`<div style="padding-top:6px;"></div>
    <div class="stat-row"><div class="stat-box"><div class="stat-num">${completed}</div><div class="stat-lbl">รอบสำเร็จ</div></div><div class="stat-box"><div class="stat-num">${totalDays}</div><div class="stat-lbl">วันรวม</div></div><div class="stat-box"><div class="stat-num">${(totalMins/60).toFixed(1)}</div><div class="stat-lbl">ชั่วโมงรวม</div></div></div>
    <div class="p-title">🏆 ถ้วยรางวัล</div>
    <div class="trophy-grid">${trophies}</div>
    <div class="p-title">📖 ประวัติทุกรอบ</div>
    ${history||'<p style="font-size:13px;color:var(--text2);">ยังไม่มีข้อมูล</p>'}`;
}

/* ═══ TIMER ═══ */
function fmtSec(s){s=Math.max(0,Math.round(s||0));return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function startTimer(di){
  if(!timerState[di])timerState[di]={elapsed:0,running:false};
  const t=timerState[di];
  t.running=true; t.startTs=Date.now()-((t.elapsed||0)*1000);
  if(timerIv[di])clearInterval(timerIv[di]);
  timerIv[di]=setInterval(()=>{
    const t=timerState[di]; if(!t||!t.running){clearInterval(timerIv[di]);return;}
    t.elapsed=Math.floor((Date.now()-t.startTs)/1000);
    const el=document.getElementById('td-'+di); if(el)el.textContent=fmtSec(t.elapsed);
  },1000);
  refreshDayBody(di);
}
function pauseTimer(di){
  const t=timerState[di]; if(!t)return;
  clearInterval(timerIv[di]); t.running=false;
  refreshDayBody(di);
}
function saveTimer(di){
  const t=timerState[di]; if(!t||!t.elapsed)return;
  if(t.running){clearInterval(timerIv[di]); t.running=false;}
  const mins=Math.max(1,Math.round((t.elapsed||0)/60));
  const type=pendingType[di]||'walk';
  curRound().days[di].sessions.push({type,minutes:mins});
  save(); t.elapsed=0; t.running=false;
  showToast('บันทึก '+TYPE_INFO[type].label+' '+fmtMin(mins)+' แล้ว 🙏');
  refreshDayBody(di);
  if(isComplete(curRound()))setTimeout(renderJournal,400);
}
function resetTimer(di){
  if(timerIv[di])clearInterval(timerIv[di]);
  timerState[di]={elapsed:0,running:false};
  const el=document.getElementById('td-'+di); if(el)el.textContent='00:00:00';
  refreshDayBody(di);
}

/* ═══ EXPORT / IMPORT ═══ */
function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob),a=document.createElement('a'),d=new Date();
  a.href=url;a.download=`dhamma-${data.name||'backup'}-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();URL.revokeObjectURL(url);showToast('สำรองข้อมูลแล้ว 💾');
}
function importData(event){
  const file=event.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{const imp=JSON.parse(e.target.result);if(!imp.rounds)throw new Error();
      showModal('นำเข้าข้อมูล?','ข้อมูลปัจจุบันจะถูกแทนที่ด้วยข้อมูลที่นำเข้า',[
        {label:'ยกเลิก'},
        {label:'นำเข้า',primary:true,action:()=>{data=imp;save();openDays={};bootApp();showToast('นำเข้าสำเร็จ ✓');}}
      ]);
    }catch(e){showToast('ไฟล์ไม่ถูกต้อง กรุณาลองใหม่');}
  };reader.readAsText(file);event.target.value='';
}

/* ═══ INIT ═══ */
if(data.name){bootApp();}
else{document.getElementById('name-screen').style.display='flex';}
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')saveName();});
</script>
